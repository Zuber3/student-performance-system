{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('students') }}" class="back-link">← Back</a>
  <h2>Add New Student</h2>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_student') }}">
    <div class="form-row">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Aarav Sharma">
      </div>
      <div class="form-group">
        <label for="roll_no">Roll Number *</label>
        <input type="text" id="roll_no" name="roll_no" required placeholder="e.g. CS2301">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="dept_id">Department *</label>
        <select id="dept_id" name="dept_id" required>
          <option value="">Select Department</option>
          {% for d in departments %}
          <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="semester">Semester *</label>
        <select id="semester" name="semester" required>
          {% for i in range(1,9) %}
          <option value="{{ i }}">Semester {{ i }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="student@college.edu">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Student →</button>
  </form>
</div>
{% endblock %}
