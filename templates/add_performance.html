{% extends "base.html" %}
{% block title %}Add Performance{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('students') }}" class="back-link">← Back</a>
  <h2>Add Performance Record</h2>
  <p>After saving, AI prediction and risk flag will be auto-generated.</p>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_performance') }}">
    <div class="form-row">
      <div class="form-group">
        <label for="student_id">Student *</label>
        <select id="student_id" name="student_id" required>
          <option value="">Select Student</option>
          {% for s in students %}
          <option value="{{ s.student_id }}">{{ s.name }} ({{ s.roll_no }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="subject_id">Subject *</label>
        <select id="subject_id" name="subject_id" required>
          <option value="">Select Subject</option>
          {% for s in subjects %}
          <option value="{{ s.subject_id }}">{{ s.subject_name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="marks_obtained">Marks Obtained (0-100) *</label>
        <input type="number" id="marks_obtained" name="marks_obtained" 
        min="0" max="100" step="0.5" required>
      </div>
      <div class="form-group">
        <label for="attendance_pct">Attendance % *</label>
        <input type="number" id="attendance_pct" name="attendance_pct" min="0" max="100" step="0.1" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="assignment_rate">Assignment Completion %</label>
        <input type="number" id="assignment_rate" name="assignment_rate" min="0" max="100" step="1" value="80">
      </div>
      <div class="form-group">
        <label for="study_hours">Weekly Study Hours</label>
        <input type="number" id="study_hours" name="study_hours" min="0" max="50" step="0.5" value="10">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="semester">Semester *</label>
        <select id="semester" name="semester" required>
          {% for i in range(1,9) %}
          <option value="{{ i }}">Semester {{ i }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="exam_year">Exam Year *</label>
        <input type="number" id="exam_year" name="exam_year" value="2024" min="2000" max="2030" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save & Run AI Prediction →</button>
  </form>
</div>
{% endblock %}
